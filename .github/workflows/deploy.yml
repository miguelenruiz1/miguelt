name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: southamerica-east1
  REGISTRY: southamerica-east1-docker.pkg.dev

jobs:
  # ── Build & push all backend images ────────────────────────────────────────
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: trace-api,        dir: trace-service }
          - { name: user-api,         dir: user-service }
          - { name: subscription-api, dir: subscription-service }
          - { name: inventory-api,    dir: inventory-service }
          - { name: integration-api,  dir: integration-service }
          - { name: compliance-api,   dir: compliance-service }
          - { name: ai-api,           dir: ai-service }
          - { name: media-api,        dir: media-service }
          - { name: gateway,          dir: gateway }
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - name: Build & push
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/trace/${{ matrix.service.name }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ./${{ matrix.service.dir }}
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  # ── Deploy backend services ────────────────────────────────────────────────
  deploy-services:
    needs: build-images
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      matrix:
        service:
          - { name: trace-api,        port: 8000, memory: 512Mi }
          - { name: user-api,         port: 8001, memory: 512Mi }
          - { name: subscription-api, port: 8002, memory: 256Mi }
          - { name: inventory-api,    port: 8003, memory: 512Mi }
          - { name: integration-api,  port: 8004, memory: 256Mi }
          - { name: compliance-api,   port: 8005, memory: 512Mi }
          - { name: ai-api,           port: 8006, memory: 256Mi }
          - { name: media-api,        port: 8007, memory: 256Mi }
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy ${{ matrix.service.name }}
        run: |
          gcloud run deploy ${{ matrix.service.name }} \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/trace/${{ matrix.service.name }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --port ${{ matrix.service.port }} \
            --memory ${{ matrix.service.memory }} \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 60s \
            --ingress internal \
            --no-allow-unauthenticated \
            --quiet

  # ── Deploy gateway (public entry point) ────────────────────────────────────
  deploy-gateway:
    needs: deploy-services
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Get service URLs
        id: urls
        run: |
          for svc in trace-api user-api subscription-api inventory-api integration-api compliance-api ai-api media-api; do
            URL=$(gcloud run services describe $svc --region ${{ env.GCP_REGION }} --format='value(status.url)' 2>/dev/null || echo "")
            # Extract host:port from https://service-xxx-rj.a.run.app
            HOST=$(echo "$URL" | sed 's|https://||')
            VAR=$(echo "$svc" | tr '-' '_' | tr '[:lower:]' '[:upper:]')_UPSTREAM
            echo "${VAR}=${HOST}:443" >> $GITHUB_OUTPUT
            echo "  $svc → $HOST"
          done

      - name: Deploy gateway
        run: |
          gcloud run deploy gateway \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/trace/gateway:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --port 9000 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 60s \
            --allow-unauthenticated \
            --set-env-vars "\
              NGINX_ENVSUBST_TEMPLATE_DIR=/etc/nginx/templates,\
              PORT=9000,\
              TRACE_UPSTREAM=${{ steps.urls.outputs.TRACE_API_UPSTREAM }},\
              USER_UPSTREAM=${{ steps.urls.outputs.USER_API_UPSTREAM }},\
              SUBS_UPSTREAM=${{ steps.urls.outputs.SUBSCRIPTION_API_UPSTREAM }},\
              INVENTORY_UPSTREAM=${{ steps.urls.outputs.INVENTORY_API_UPSTREAM }},\
              INTEGRATION_UPSTREAM=${{ steps.urls.outputs.INTEGRATION_API_UPSTREAM }},\
              COMPLIANCE_UPSTREAM=${{ steps.urls.outputs.COMPLIANCE_API_UPSTREAM }},\
              AI_UPSTREAM=${{ steps.urls.outputs.AI_API_UPSTREAM }},\
              MEDIA_UPSTREAM=${{ steps.urls.outputs.MEDIA_API_UPSTREAM }}" \
            --quiet

      - name: Print gateway URL
        run: |
          URL=$(gcloud run services describe gateway --region ${{ env.GCP_REGION }} --format='value(status.url)')
          echo "::notice::Gateway deployed at: $URL"
          echo "GATEWAY_URL=$URL" >> $GITHUB_OUTPUT

  # ── Build & deploy frontend ────────────────────────────────────────────────
  deploy-frontend:
    needs: deploy-gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Get gateway URL
        id: gw
        run: |
          URL=$(gcloud run services describe gateway --region ${{ env.GCP_REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Frontend will use API: $URL"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-trace/package-lock.json

      - name: Build frontend
        working-directory: front-trace
        env:
          VITE_API_URL: ${{ steps.gw.outputs.url }}
          VITE_TENANT_ID: default
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          entryPoint: front-trace
