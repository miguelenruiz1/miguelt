version: "3.9"

services:
  api:
    build:
      context: ./trace-service
      dockerfile: Dockerfile
      target: runtime
    image: trace-service:latest
    container_name: trace-api
    env_file: .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop --http h11
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ./trace-service
      dockerfile: Dockerfile
      target: runtime
    image: trace-service:latest
    container_name: trace-worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - trace-net
    restart: unless-stopped
    command: python -m worker.worker_main
    healthcheck:
      test: ["CMD", "pgrep", "-f", "worker_main"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: trace-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracepass}
      POSTGRES_DB: ${POSTGRES_DB:-tracedb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5471:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trace} -d ${POSTGRES_DB:-tracedb}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trace-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - trace-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy volatile-ttl

  user-postgres:
    image: postgres:16-alpine
    container_name: user-postgres
    environment:
      POSTGRES_USER: user_svc
      POSTGRES_PASSWORD: userpass
      POSTGRES_DB: userdb
    volumes:
      - user-postgres-data:/var/lib/postgresql/data
    ports:
      - "5472:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_svc -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: trace-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - trace-net
    restart: unless-stopped

  user-api:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    image: user-service:latest
    container_name: user-api
    environment:
      DATABASE_URL: postgresql+asyncpg://user_svc:userpass@user-postgres:5432/userdb
      REDIS_URL: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      LOG_LEVEL: INFO
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: noreply@trace.app
      SMTP_USE_TLS: "false"
      FRONTEND_URL: http://localhost:5173
      SUBSCRIPTION_SERVICE_URL: http://subscription-api:8002
    ports:
      - "9001:8001"
    depends_on:
      user-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - user-uploads:/app/uploads
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  subscription-postgres:
    image: postgres:16-alpine
    container_name: subscription-postgres
    environment:
      POSTGRES_USER: sub_svc
      POSTGRES_PASSWORD: subpass
      POSTGRES_DB: subdb
    volumes:
      - subscription-postgres-data:/var/lib/postgresql/data
    ports:
      - "5473:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sub_svc -d subdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  subscription-api:
    build:
      context: ./subscription-service
      dockerfile: Dockerfile
      target: runtime
    image: subscription-service:latest
    container_name: subscription-api
    environment:
      DATABASE_URL: postgresql+asyncpg://sub_svc:subpass@subscription-postgres:5432/subdb
      REDIS_URL: redis://redis:6379/3
      USER_SERVICE_URL: http://user-api:8001
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      LOG_LEVEL: INFO
    ports:
      - "9002:8002"
    depends_on:
      subscription-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-api:
        condition: service_healthy
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8002 --workers 2
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  inventory-postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres
    environment:
      POSTGRES_USER: inv_svc
      POSTGRES_PASSWORD: invpass
      POSTGRES_DB: inventorydb
    volumes:
      - inventory-postgres-data:/var/lib/postgresql/data
    ports:
      - "5474:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inv_svc -d inventorydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  inventory-api:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    image: inventory-service:latest
    container_name: inventory-api
    environment:
      DATABASE_URL: postgresql+asyncpg://inv_svc:invpass@inventory-postgres:5432/inventorydb
      REDIS_URL: redis://redis:6379/4
      USER_SERVICE_URL: http://user-api:8001
      SUBSCRIPTION_SERVICE_URL: http://subscription-api:8002
      AI_SERVICE_URL: http://ai-api:8006
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      LOG_LEVEL: INFO
    ports:
      - "9003:8003"
    depends_on:
      inventory-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-api:
        condition: service_healthy
      subscription-api:
        condition: service_healthy
    volumes:
      - inventory-uploads:/app/uploads
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8003 --workers 2
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  integration-postgres:
    image: postgres:16-alpine
    container_name: integration-postgres
    environment:
      POSTGRES_USER: int_svc
      POSTGRES_PASSWORD: intpass
      POSTGRES_DB: integrationdb
    volumes:
      - integration-postgres-data:/var/lib/postgresql/data
    ports:
      - "5475:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U int_svc -d integrationdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  integration-api:
    build:
      context: ./integration-service
      dockerfile: Dockerfile
    image: integration-service:latest
    container_name: integration-api
    environment:
      DATABASE_URL: postgresql+asyncpg://int_svc:intpass@integration-postgres:5432/integrationdb
      REDIS_URL: redis://redis:6379/5
      USER_SERVICE_URL: http://user-api:8001
      SUBSCRIPTION_SERVICE_URL: http://subscription-api:8002
      INVENTORY_SERVICE_URL: http://inventory-api:8003
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      ENCRYPTION_KEY: change-me-32-chars-encryption-k!
      LOG_LEVEL: INFO
    ports:
      - "9004:8004"
    depends_on:
      integration-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-api:
        condition: service_healthy
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8004 --workers 2
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Compliance Service ────────────────────────────────────────────────────
  compliance-postgres:
    image: postgres:16-alpine
    container_name: compliance-postgres
    environment:
      POSTGRES_USER: cmp_svc
      POSTGRES_PASSWORD: cmppass
      POSTGRES_DB: compliancedb
    volumes:
      - compliance-postgres-data:/var/lib/postgresql/data
    ports:
      - "5476:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmp_svc -d compliancedb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  compliance-api:
    build:
      context: ./compliance-service
      dockerfile: Dockerfile
    image: compliance-service:latest
    container_name: compliance-api
    environment:
      DATABASE_URL: postgresql+asyncpg://cmp_svc:cmppass@compliance-postgres:5432/compliancedb
      REDIS_URL: redis://redis:6379/6
      USER_SERVICE_URL: http://user-api:8001
      SUBSCRIPTION_SERVICE_URL: http://subscription-api:8002
      TRACE_SERVICE_URL: http://trace-api:8000
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      LOG_LEVEL: INFO
    ports:
      - "9005:8005"
    depends_on:
      compliance-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-api:
        condition: service_healthy
      subscription-api:
        condition: service_healthy
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8005 --workers 2
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  adminer:
    image: adminer:latest
    container_name: trace-adminer
    ports:
      - "8080:8080"
    networks:
      - trace-net
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - tools

  # ─── AI Service ──────────────────────────────────────────────────────────────

  ai-postgres:
    image: postgres:16-alpine
    container_name: ai-postgres
    environment:
      POSTGRES_USER: ai_svc
      POSTGRES_PASSWORD: aipass
      POSTGRES_DB: aidb
    volumes:
      - ai-postgres-data:/var/lib/postgresql/data
    ports:
      - "5477:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_svc -d aidb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ai-api:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: ai-service:latest
    container_name: ai-api
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_svc:aipass@ai-postgres:5432/aidb
      REDIS_URL: redis://redis:6379/7
      USER_SERVICE_URL: http://user-api:8001
      INVENTORY_SERVICE_URL: http://inventory-api:8003
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: INFO
    ports:
      - "9006:8006"
    depends_on:
      ai-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8006 --workers 2"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8006/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  trace-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  user-postgres-data:
  user-uploads:
  inventory-uploads:
  subscription-postgres-data:
  inventory-postgres-data:
  integration-postgres-data:
  compliance-postgres-data:
  ai-postgres-data:
