version: "3.9"

# Default logging policy for every long-running container. Without this a
# weekend of `docker compose up` fills the laptop disk with unbounded logs.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    build:
      context: ./trace-service
      dockerfile: Dockerfile
      target: runtime
    image: trace-service:latest
    logging: *default-logging
    container_name: trace-api
    env_file: .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MEDIA_SERVICE_URL: http://media-api:8007
      # Must match user-service so JWTs issued by user-api validate here.
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
    ports:
      - "8000:8000"
    volumes:
      - trace-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop --http h11
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ./trace-service
      dockerfile: Dockerfile
      target: runtime
    image: trace-service:latest
    logging: *default-logging
    container_name: trace-worker
    env_file: .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # CRÍTICO: JWT_SECRET y FERNET_KEY DEBEN coincidir con trace-api,
      # porque la API encripta el secret de la wallet con Fernet derivado de
      # JWT_SECRET (cuando FERNET_KEY no está seteado). Si difieren, el worker
      # no puede desencriptar y el anclaje custodial falla con
      # "custodian_secret_b58 inválido".
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      FERNET_KEY: ${FERNET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - trace-uploads:/app/uploads
    networks:
      - trace-net
    restart: unless-stopped
    command: python -m worker.worker_main
    healthcheck:
      # Image ships without procps; use /proc walk to find worker_main.
      test: ["CMD-SHELL", "grep -q worker_main /proc/*/cmdline 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: trace-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracepass}
      POSTGRES_DB: ${POSTGRES_DB:-tracedb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5471:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trace} -d ${POSTGRES_DB:-tracedb}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trace-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - trace-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy volatile-ttl

  user-postgres:
    image: postgres:16-alpine
    container_name: user-postgres
    environment:
      POSTGRES_USER: user_svc
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD:-userpass}
      POSTGRES_DB: userdb
    volumes:
      - user-postgres-data:/var/lib/postgresql/data
    ports:
      - "5472:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_svc -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: trace-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - trace-net
    restart: unless-stopped

  user-api:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    image: user-service:latest
    container_name: user-api
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql+asyncpg://user_svc:${USER_DB_PASSWORD:-userpass}@user-postgres:5432/userdb
      REDIS_URL: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      LOG_LEVEL: INFO
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MEDIA_SERVICE_URL: http://media-api:8007
      S2S_SERVICE_TOKEN: ${S2S_SERVICE_TOKEN:-s2s-change-me-in-production}
      SMTP_FROM: onboarding@resend.dev
      SMTP_USE_TLS: "false"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SUBSCRIPTION_SERVICE_URL: http://subscription-api:8002
      TRACE_SERVICE_URL: http://api:8000
    ports:
      - "9001:8001"
    depends_on:
      user-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - user-uploads:/app/uploads
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  subscription-postgres:
    image: postgres:16-alpine
    container_name: subscription-postgres
    environment:
      POSTGRES_USER: sub_svc
      POSTGRES_PASSWORD: ${SUB_DB_PASSWORD:-subpass}
      POSTGRES_DB: subdb
    volumes:
      - subscription-postgres-data:/var/lib/postgresql/data
    ports:
      - "5473:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sub_svc -d subdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  subscription-api:
    build:
      context: ./subscription-service
      dockerfile: Dockerfile
      target: runtime
    image: subscription-service:latest
    container_name: subscription-api
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql+asyncpg://sub_svc:${SUB_DB_PASSWORD:-subpass}@subscription-postgres:5432/subdb
      REDIS_URL: redis://redis:6379/3
      USER_SERVICE_URL: http://user-api:8001
      INTEGRATION_SERVICE_URL: http://integration-api:8004
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      S2S_SERVICE_TOKEN: ${S2S_SERVICE_TOKEN:-s2s-change-me-in-production}
      LOG_LEVEL: INFO
    ports:
      - "9002:8002"
    depends_on:
      subscription-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-api:
        condition: service_healthy
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8002 --workers 2
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  inventory-postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres
    environment:
      POSTGRES_USER: inv_svc
      POSTGRES_PASSWORD: ${INV_DB_PASSWORD:-invpass}
      POSTGRES_DB: inventorydb
    volumes:
      - inventory-postgres-data:/var/lib/postgresql/data
    ports:
      - "5474:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inv_svc -d inventorydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  inventory-api:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    image: inventory-service:latest
    container_name: inventory-api
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql+asyncpg://inv_svc:${INV_DB_PASSWORD:-invpass}@inventory-postgres:5432/inventorydb
      REDIS_URL: redis://redis:6379/4
      USER_SERVICE_URL: http://user-api:8001
      SUBSCRIPTION_SERVICE_URL: http://subscription-api:8002
      AI_SERVICE_URL: http://ai-api:8006
      MEDIA_SERVICE_URL: http://media-api:8007
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      LOG_LEVEL: INFO
    ports:
      - "9003:8003"
    depends_on:
      inventory-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-api:
        condition: service_healthy
      subscription-api:
        condition: service_healthy
    volumes:
      - inventory-uploads:/app/uploads
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8003 --workers 2
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  integration-postgres:
    image: postgres:16-alpine
    container_name: integration-postgres
    environment:
      POSTGRES_USER: int_svc
      POSTGRES_PASSWORD: ${INT_DB_PASSWORD:-intpass}
      POSTGRES_DB: integrationdb
    volumes:
      - integration-postgres-data:/var/lib/postgresql/data
    ports:
      - "5475:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U int_svc -d integrationdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  integration-api:
    build:
      context: ./integration-service
      dockerfile: Dockerfile
    image: integration-service:latest
    container_name: integration-api
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql+asyncpg://int_svc:${INT_DB_PASSWORD:-intpass}@integration-postgres:5432/integrationdb
      REDIS_URL: redis://redis:6379/5
      USER_SERVICE_URL: http://user-api:8001
      SUBSCRIPTION_SERVICE_URL: http://subscription-api:8002
      INVENTORY_SERVICE_URL: http://inventory-api:8003
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      ENCRYPTION_KEY: change-me-32-chars-encryption-k!
      LOG_LEVEL: INFO
    ports:
      - "9004:8004"
    depends_on:
      integration-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-api:
        condition: service_healthy
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8004 --workers 2
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Compliance Service ────────────────────────────────────────────────────
  compliance-postgres:
    image: postgres:16-alpine
    container_name: compliance-postgres
    environment:
      POSTGRES_USER: cmp_svc
      POSTGRES_PASSWORD: ${CMP_DB_PASSWORD:-cmppass}
      POSTGRES_DB: compliancedb
    volumes:
      - compliance-postgres-data:/var/lib/postgresql/data
    ports:
      - "5476:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmp_svc -d compliancedb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  compliance-api:
    build:
      context: ./compliance-service
      dockerfile: Dockerfile
    image: compliance-service:latest
    container_name: compliance-api
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql+asyncpg://cmp_svc:${CMP_DB_PASSWORD:-cmppass}@compliance-postgres:5432/compliancedb
      REDIS_URL: redis://redis:6379/6
      USER_SERVICE_URL: http://user-api:8001
      SUBSCRIPTION_SERVICE_URL: http://subscription-api:8002
      TRACE_SERVICE_URL: http://trace-api:8000
      MEDIA_SERVICE_URL: http://media-api:8007
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      S2S_SERVICE_TOKEN: ${S2S_SERVICE_TOKEN:-s2s-change-me-in-production}
      GFW_API_KEY: ${GFW_API_KEY:-}
      SOLANA_NETWORK: ${SOLANA_NETWORK:-devnet}
      LOG_LEVEL: INFO
    ports:
      - "9005:8005"
    depends_on:
      compliance-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-api:
        condition: service_healthy
      subscription-api:
        condition: service_healthy
    networks:
      - trace-net
    restart: unless-stopped
    volumes:
      - compliance-uploads:/app/uploads
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8005 --workers 2
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  adminer:
    image: adminer:latest
    container_name: trace-adminer
    ports:
      - "8080:8080"
    networks:
      - trace-net
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - tools

  # ─── AI Service ──────────────────────────────────────────────────────────────

  ai-postgres:
    image: postgres:16-alpine
    container_name: ai-postgres
    environment:
      POSTGRES_USER: ai_svc
      POSTGRES_PASSWORD: ${AI_DB_PASSWORD:-aipass}
      POSTGRES_DB: aidb
    volumes:
      - ai-postgres-data:/var/lib/postgresql/data
    ports:
      - "5477:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_svc -d aidb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ai-api:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: ai-service:latest
    container_name: ai-api
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_svc:${AI_DB_PASSWORD:-aipass}@ai-postgres:5432/aidb
      REDIS_URL: redis://redis:6379/7
      USER_SERVICE_URL: http://user-api:8001
      INVENTORY_SERVICE_URL: http://inventory-api:8003
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: INFO
    ports:
      - "9006:8006"
    depends_on:
      ai-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8006 --workers 2"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8006/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Media Service ────────────────────────────────────────────────────────

  media-postgres:
    image: postgres:16-alpine
    container_name: media-postgres
    environment:
      POSTGRES_USER: media_svc
      POSTGRES_PASSWORD: ${MEDIA_DB_PASSWORD:-mediapass}
      POSTGRES_DB: mediadb
    volumes:
      - media-postgres-data:/var/lib/postgresql/data
    ports:
      - "5478:5432"
    networks:
      - trace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_svc -d mediadb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  media-api:
    build:
      context: ./media-service
      dockerfile: Dockerfile
    image: media-service:latest
    container_name: media-api
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql+asyncpg://media_svc:${MEDIA_DB_PASSWORD:-mediapass}@media-postgres:5432/mediadb
      REDIS_URL: redis://redis:6379/8
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-prod}
      S2S_SERVICE_TOKEN: ${S2S_SERVICE_TOKEN:-s2s-change-me-in-production}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_S3_REGION: ${AWS_S3_REGION:-us-east-1}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      LOG_LEVEL: INFO
    ports:
      - "9007:8007"
    volumes:
      - media-uploads:/app/uploads
    depends_on:
      media-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trace-net
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8007 --workers 2
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8007/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  gateway:
    build: ./gateway
    image: trace-gateway:latest
    container_name: trace-gateway
    logging: *default-logging
    # Override the Cloud Run entrypoint: in compose we use the static
    # nginx.conf baked into the image (upstreams point to compose hostnames).
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "9000:9000"
    depends_on:
      - api
      - user-api
      - subscription-api
      - inventory-api
      - integration-api
      - compliance-api
      - ai-api
      - media-api
    networks:
      - trace-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  trace-net:
    driver: bridge

volumes:
  postgres-data:
  trace-uploads:
  redis-data:
  user-postgres-data:
  user-uploads:
  inventory-uploads:
  subscription-postgres-data:
  inventory-postgres-data:
  integration-postgres-data:
  compliance-postgres-data:
  compliance-uploads:
  ai-postgres-data:
  media-postgres-data:
  media-uploads:
