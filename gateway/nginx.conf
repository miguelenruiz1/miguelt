upstream trace     { server trace-api:8000; }
upstream users     { server user-api:8001; }
upstream subs      { server subscription-api:8002; }
upstream inventory { server inventory-api:8003; }
upstream integ     { server integration-api:8004; }
upstream comply    { server compliance-api:8005; }
upstream ai        { server ai-api:8006; }
upstream media     { server media-api:8007; }

server {
    listen 9000;
    server_name _;

    client_max_body_size 50m;

    # ── Proxy defaults ───────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect   ~^http://[^/]+(/.*)$ $1;
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # ── CORS (single place) ──────────────────────────────────────────
    add_header Access-Control-Allow-Origin  $http_origin always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Tenant-Id,X-User-Id,X-Service-Token,X-Correlation-Id,Idempotency-Key,X-Admin-Key" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age 86400 always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Health ───────────────────────────────────────────────────────
    location = /health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # ── Readiness (proxied to trace-api for Solana/DB checks) ────
    location = /ready { proxy_pass http://trace$request_uri; }

    # ── Public cNFT metadata (no auth, Solana explorers need access) ──
    location /api/v1/assets/metadata/ { proxy_pass http://trace$request_uri; }

    # ── User Service ─────────────────────────────────────────────────
    location /api/v1/auth            { proxy_pass http://users$request_uri; }
    location /api/v1/users           { proxy_pass http://users$request_uri; }
    location /api/v1/roles           { proxy_pass http://users$request_uri; }
    location /api/v1/permissions     { proxy_pass http://users$request_uri; }
    location /api/v1/email-templates { proxy_pass http://users$request_uri; }
    location /api/v1/email-config    { proxy_pass http://users$request_uri; }
    location /api/v1/email-providers { proxy_pass http://users$request_uri; }
    location /api/v1/notifications   { proxy_pass http://users$request_uri; }
    location /api/v1/onboarding      { proxy_pass http://users$request_uri; }

    # ── Subscription Service ─────────────────────────────────────────
    location /api/v1/plans           { proxy_pass http://subs$request_uri; }
    location /api/v1/subscriptions   { proxy_pass http://subs$request_uri; }
    location /api/v1/licenses        { proxy_pass http://subs$request_uri; }
    location /api/v1/modules         { proxy_pass http://subs$request_uri; }
    location /api/v1/payments        { proxy_pass http://subs$request_uri; }
    location /api/v1/platform        { proxy_pass http://subs$request_uri; }
    location /api/v1/admin           { proxy_pass http://subs$request_uri; }
    location /api/v1/usage           { proxy_pass http://subs$request_uri; }
    location /api/v1/enforcement     { proxy_pass http://subs$request_uri; }

    # ── Inventory Service ────────────────────────────────────────────
    location /api/v1/categories         { proxy_pass http://inventory$request_uri; }
    location /api/v1/products           { proxy_pass http://inventory$request_uri; }
    location /api/v1/warehouses         { proxy_pass http://inventory$request_uri; }
    location /api/v1/stock              { proxy_pass http://inventory$request_uri; }
    location /api/v1/movements          { proxy_pass http://inventory$request_uri; }
    location /api/v1/suppliers          { proxy_pass http://inventory$request_uri; }
    location /api/v1/purchase-orders    { proxy_pass http://inventory$request_uri; }
    location /api/v1/sales-orders       { proxy_pass http://inventory$request_uri; }
    location /api/v1/customers          { proxy_pass http://inventory$request_uri; }
    location /api/v1/partners           { proxy_pass http://inventory$request_uri; }
    location /api/v1/customer-prices    { proxy_pass http://inventory$request_uri; }
    location /api/v1/serials            { proxy_pass http://inventory$request_uri; }
    location /api/v1/batches            { proxy_pass http://inventory$request_uri; }
    location /api/v1/recipes            { proxy_pass http://inventory$request_uri; }
    location /api/v1/production-runs    { proxy_pass http://inventory$request_uri; }
    location /api/v1/production-resources { proxy_pass http://inventory$request_uri; }
    location /api/v1/cycle-counts       { proxy_pass http://inventory$request_uri; }
    location /api/v1/imports            { proxy_pass http://inventory$request_uri; }
    location /api/v1/public/batch       { proxy_pass http://inventory$request_uri; }
    location /api/v1/alerts             { proxy_pass http://inventory$request_uri; }
    location /api/v1/portal             { proxy_pass http://inventory$request_uri; }
    location /api/v1/reorder            { proxy_pass http://inventory$request_uri; }
    location /api/v1/tax-rates          { proxy_pass http://inventory$request_uri; }
    location /api/v1/tax-categories     { proxy_pass http://inventory$request_uri; }
    location /api/v1/uom               { proxy_pass http://inventory$request_uri; }
    location /api/v1/variant-attributes { proxy_pass http://inventory$request_uri; }
    location /api/v1/variants           { proxy_pass http://inventory$request_uri; }
    location /api/v1/reports            { proxy_pass http://inventory$request_uri; }
    location /api/v1/events             { proxy_pass http://inventory$request_uri; }
    location /api/v1/config             { proxy_pass http://inventory$request_uri; }

    # ── Trace Service (workflow config — longer prefix wins over /config) ─
    location /api/v1/config/workflow    { proxy_pass http://trace$request_uri; }

    # ── Inventory analytics & audit (longer prefix wins over trace) ─
    location /api/v1/analytics/overview          { proxy_pass http://inventory$request_uri; }
    location /api/v1/analytics/occupation        { proxy_pass http://inventory$request_uri; }
    location /api/v1/analytics/abc               { proxy_pass http://inventory$request_uri; }
    location /api/v1/analytics/eoq               { proxy_pass http://inventory$request_uri; }
    location /api/v1/analytics/stock-policy      { proxy_pass http://inventory$request_uri; }
    location /api/v1/analytics/storage-valuation { proxy_pass http://inventory$request_uri; }
    location /api/v1/analytics/committed-stock   { proxy_pass http://inventory$request_uri; }
    location /api/v1/audit                       { proxy_pass http://inventory$request_uri; }

    # ── Integration Service ──────────────────────────────────────────
    location /api/v1/integrations    { proxy_pass http://integ$request_uri; }
    location /api/v1/resolutions     { proxy_pass http://integ$request_uri; }
    location /api/v1/webhooks        { proxy_pass http://integ$request_uri; }

    # ── Compliance Service ───────────────────────────────────────────
    location /api/v1/compliance      { proxy_pass http://comply$request_uri; }

    # ── AI Service ───────────────────────────────────────────────────
    location /api/v1/analyze         { proxy_pass http://ai$request_uri; }
    location /api/v1/settings        { proxy_pass http://ai$request_uri; }
    location /api/v1/memory          { proxy_pass http://ai$request_uri; }
    location /api/v1/metrics         { proxy_pass http://ai$request_uri; }

    # ── Media Service ────────────────────────────────────────────────
    location /api/v1/media           { proxy_pass http://media$request_uri; }

    # ── Trace Service (default / catch-all) ──────────────────────────
    location /api/v1/                { proxy_pass http://trace$request_uri; }
}
