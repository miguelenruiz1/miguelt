steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - VITE_API_URL=https://gateway-421343664920.southamerica-east1.run.app
      - --build-arg
      - VITE_TENANT_ID=default
      - -t
      - southamerica-east1-docker.pkg.dev/trace-log/trace/front-trace:6f80112
      - .
images:
  - southamerica-east1-docker.pkg.dev/trace-log/trace/front-trace:6f80112
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
